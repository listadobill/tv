<!DOCTYPE html>
<html>
<head>
  <title>TV DO BILL</title>
  <style>
    body {
      display: flex;
      align-items: center;
      background-color: #141414;
      color: #FFF;
      font-family: Arial, sans-serif;
    }

    #link-list {
      flex: 1;
      padding: 20px;
      max-height: 400px;
      overflow-y: auto;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 10px;
      text-align: center;
      color: #E50914;
    }

    h2 {
      font-size: 16px;
      margin-top: 0;
      opacity: 0.7;
      text-align: center;
    }

    button {
      display: block;
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      border: none;
      background-color: #E50914;
      color: #FFF;
      font-size: 16px;
      text-align: left;
    }

    button:hover {
      cursor: pointer;
      background-color: #B2070F;
    }

    #player-container {
      flex: 2;
      display: flex;
      justify-content: center;
      align-items: center;
    }
  </style>
</head>
<body>
  <div id="link-list">
    <h1>TV DO BILL</h1>
    <h2>A TV Stream grátis de verdade</h2>
    <ul>
      <li><button data-href="https://embedflix.net/tv/band-tv-sp">Band TV SP</button></li>
      <li><button data-href="https://embedflix.net/tv/globo-sp">Globo SP</button></li>
      <li><button data-href="https://embedflix.net/tv/br-globo-news-hd">Globo News HD</button></li>
      <li><button data-href="https://embedflix.net/tv/record-tv-sp">Record TV SP</button></li>
      <!-- Adicione mais botões aqui, se necessário -->
    </ul>
  </div>

  <script>
    var linkList = document.getElementById("link-list");

    linkList.addEventListener("click", function(event) {
      event.preventDefault();
      if (event.target.tagName === "BUTTON") {
        var link = event.target.getAttribute("data-href");
        window.location.href = link;
      }
    });
  </script>
</body>
</html>
