<!DOCTYPE html>
<html>
<head>
  <title></title>
  <style>
    pre {
      white-space: pre-wrap;
    }
    .warning {
      color: red;
      font-weight: bold;
    }
  </style>
  <script>
    window.onload = function() {
      // URLs das fontes IPTV
      var urls = [
        "https://raw.githubusercontent.com/listadobill/tv/main/cattvbr.m3u",
        "https://iptv-org.github.io/iptv/countries/br.m3u",
        "https://raw.githubusercontent.com/listadobill/tv/main/pluto.m3u"
        "https://bit.ly/42I6Huk"
      ];

      var combinedContent = "";
      var unavailableSources = [];

      // Função para obter o conteúdo de uma URL
      function getIPTVContent(url, callback) {
        var xhr = new XMLHttpRequest();
        xhr.open("GET", url);
        xhr.onreadystatechange = function() {
          if (xhr.readyState === 4) {
            if (xhr.status === 200) {
              callback(xhr.responseText);
            } else {
              unavailableSources.push(url);
              callback(null);
            }
          }
        };
        xhr.send();
      }

      // Função para combinar o conteúdo das URLs IPTV
      function combineContent() {
        var completedRequests = 0;

        urls.forEach(function(url) {
          getIPTVContent(url, function(content) {
            if (content) {
              combinedContent += content + "\n";
            }
            completedRequests++;

            // Verifica se todas as solicitações foram concluídas
            if (completedRequests === urls.length) {
              displayCombinedContent(combinedContent);
              displayUnavailableSources();
            }
          });
        });
      }

      // Função para exibir o conteúdo combinado na página
      function displayCombinedContent(content) {
        var channels = extractChannels(content);
        var sortedContent = buildM3UContent(channels);

        var container = document.getElementById("combined-content");
        var pre = document.createElement("pre");
        pre.textContent = sortedContent;
        container.appendChild(pre);
      }

      // Função para extrair os canais do conteúdo
      function extractChannels(content) {
        var lines = content.trim().split("\n");
        var channels = [];
        var currentChannel = "";

        lines.forEach(function(line) {
          if (line.startsWith("#EXTINF:")) {
            if (currentChannel !== "") {
              channels.push(currentChannel);
            }
            currentChannel = line + "\n";
          } else {
            currentChannel += line + "\n";
          }
        });

        if (currentChannel !== "") {
          channels.push(currentChannel);
        }

        return channels;
      }

      // Função para ordenar e construir o conteúdo .m3u
      function buildM3UContent(channels) {
        channels.sort();

        var sortedContent = "";
        channels.forEach(function(channel) {
          sortedContent += channel;
        });

        return sortedContent;
      }

      // Função para exibir as fontes indisponíveis na página
      function displayUnavailableSources() {
        var container = document.getElementById("unavailable-sources");
        if (unavailableSources.length > 0) {
          var warning = document.createElement("p");
          warning.className = "warning";
          warning.textContent = "As seguintes fontes estão indisponíveis:";
          container.appendChild(warning);

          unavailableSources.forEach(function(url) {
            var source = document.createElement("p");
            source.className = "warning";
            source.textContent = url;
            container.appendChild(source);
          });
        }
      }

      // Inicia a combinação do conteúdo
      combineContent();
    };
  </script>
</head>
<body>
  <h1></h1>
  <div id="unavailable-sources"></div>
  <div id="combined-content"></div>
</body>
</html>
