        var embedder_client_ip = '';
        function getIP(json) {
            embedder_client_ip = json.ip;
        }
                $(window).on('load', function() {
                                        let video_id = 3141;
                $.ajax({
                    url: `${HOME_URL}/api`,
                    method: 'POST',
                    data: {
                        action      : 'getPlayer',
                        client_ip   : embedder_client_ip,
                        video_id
                    },
                    success: function(msg) {
                        if (p2pml.hlsjs.Engine.isSupported()) {
                            const config = {
                                
                              loader: {
                                  httpUseRanges:true, WaitForTracker: true, WaitForTrackerCounter:9500,
                                trackerAnnounce: [
                                  "wss://up.embedflix.net:442","wss://tracker.openwebtorrent.com"
                                ],
                                rtcConfig: {
                                  iceServers: [
                                    { urls: "stun:stun.l.google.com:19302" },
                                    { urls: "stun:stun4.l.google.com:19302" },
                                  ]
                                }
                                                  }
                                                };

                            var engine = new p2pml.hlsjs.Engine(config);
                            engine.on("peer_connect", peer => console.log("peer_connect", peer.id, peer.remoteAddress));
                            engine.on("peer_close", peerId => console.log("peer_close", peerId));
                            engine.on("segment_loaded", (segment, peerId) => console.log("segment_loaded from", peerId ? `peer ${peerId}` : "HTTPS", segment.url));
                            $('.player_container .infra').append(`<div id="video" style="height: 100%; width: 100%;"></div>`);
                            
                            
                            
                            var player = new Clappr.Player({
                                parentId: "#video",
                                source: `${msg.data.video_url}?wmsAuthSign=${msg.data.url_signature}`,
                                mimeType: 'application/x-mpegURL',
                                autoPlay: true,
                                width: '100%',
                                height: '100%',
                                gaAccount: 'UA-81463906-8',
                                plugins: [ChromecastPlugin, LevelSelector],
                                
                                
                                playback: {
                                    hlsjsConfig: {
                                        liveSyncDurationCount: 30, // To have at least 7 segments in queue
                                        maxBufferLength : 30,
                                        loader: engine.createLoaderClass(),
                                        
                                        
                                        
                                    },
                                    
                                },
                                
                                events: {
                                            onError: function(e) {
                                              setTimeout(function() { player.configure(player.options); }, 7000);
                                            }
                                          },

                              levelSelectorConfig: {
                                title: 'Quality',
                                labels: {
                                    2: '', // 500kbps
                                    1: '', // 240kbps
                                    0: 'Mobile ', // 120kbps
                                },
                                labelCallback: function(playbackLevel, customLabel) {
                                    return customLabel + playbackLevel.level.height+'p'; // High 720p
                                }
                              },
                                
                            });

                            p2pml.hlsjs.initClapprPlayer(player);
                            
                            player.setVolume(50); // 1%
                            player.play();
                        } else {
                            alert('Seu navegador não suporta a');
                        }
                    },
                    error: function(msg) {
                        $('.player_loading').remove();

                        if ( msg.responseJSON ) {
                            if ( data in msg.responseJSON ) {
                                produce_native_notify(msg.responseJSON.data.errors, 'error');
                            }
                        } else {
                            produce_native_notify('Houve um erro inesperado.', 'error');
                        }
                    }
                });
                    });
