<!DOCTYPE html>
<html>
<head>
    <title>TV DO BILL</title>
    <style>
        body {
            color: #ffffff;
            background-color: #1c1c1c;
            transition: color 0.3s ease-in-out, background-color 0.3s ease-in-out;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            font-family: Arial, sans-serif;
        }

        h1 {
            color: #d32f2f;
            text-align: center;
            font-size: 32px;
            margin-top: 20px;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .channel-list {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            max-height: 400px;
            overflow-y: auto;
            padding: 10px;
        }

        .channel-list button {
            margin-bottom: 5px;
            padding: 10px;
            font-size: 16px;
            width: 200px;
            background-color: #1c1c1c;
            color: #ffffff;
            border: 1px solid #d32f2f;
            transition: background-color 0.3s ease-in-out, color 0.3s ease-in-out;
            align-items: center;
            text-align: left;
        }

        .channel-list button:hover {
            background-color: #d32f2f;
            color: #ffffff;
        }

        .video-player {
            max-width: 100%; /* Defina o tamanho máximo do player de vídeo */
            width: 800px; /* Defina uma largura fixa para o player de vídeo ou ajuste conforme necessário */
            max-height: 450px; /* Defina a altura máxima do player de vídeo */
            margin-top: 20px;
        }
    </style>
    <link href="https://vjs.zencdn.net/7.15.4/video-js.css" rel="stylesheet">
    <script src="https://vjs.zencdn.net/7.15.4/video.js"></script>
</head>
<body>
    <h1>TV DO BILL</h1>
    <div class="container">
        <div class="channel-list" id="channel-list"></div>
        <video id="video-player" class="video-js vjs-default-skin" controls loop></video>
    </div>

    <script>
        // Resto do seu código JavaScript...
    </script>
</body>
</html>
