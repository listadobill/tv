<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>TV DO BILL</title>
    <style>
        /* Estilos CSS aqui */
    </style>
</head>
<body>
    <!-- Conteúdo HTML aqui -->

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            var playlistUrl = "https://raw.githubusercontent.com/listadobill/tv/main/1.m3u";
            var channelButtonsContainer = document.getElementById("channel-buttons");
            var videoPlayer = document.getElementById("iptv-player");
            var reconnectOverlay = document.getElementById("reconnect-overlay");

            var currentChannelUrl = ""; // Variável para armazenar a URL do canal atual

            fetch(playlistUrl)
                .then(function(response) {
                    return response.text();
                })
                .then(function(data) {
                    var lines = data.split("\n");
                    var channels = [];

                    for (var i = 0; i < lines.length; i++) {
                        var line = lines[i].trim();

                        if (line.startsWith("#EXTINF:")) {
                            var name = line.split(",")[1];
                            var url = lines[i+1].trim();
                            var logo = getLogoFromLine(line);
                            channels.push({ name: name, url: url, "tvg-logo": logo });
                        }
                    }

                    channels.sort(function(a, b) {
                        return a.name.localeCompare(b.name);
                    });

                    channels.forEach(function(channel) {
                        var button = document.createElement("button");
                        button.textContent = channel.name.toUpperCase();

                        if (channel.hasOwnProperty("tvg-logo")) {
                            button.style.backgroundImage = "url(" + channel["tvg-logo"] + ")";
                            button.style.backgroundSize = "cover";
                        }

                        button.addEventListener("click", function() {
                            playChannel(channel.url);
                        });

                        channelButtonsContainer.appendChild(button);
                    });
                })
                .catch(function(error) {
                    console.error("Erro ao carregar a playlist IPTV:", error);
                });

            function getLogoFromLine(line) {
                var logoIndex = line.indexOf("tvg-logo=");

                if (logoIndex !== -1) {
                    var startQuoteIndex = line.indexOf('"', logoIndex);
                    var endQuoteIndex = line.indexOf('"', startQuoteIndex + 1);

                    if (startQuoteIndex !== -1 && endQuoteIndex !== -1) {
                        return line.substring(startQuoteIndex + 1, endQuoteIndex);
                    }
                }

                return null;
            }

            // Resto do código JavaScript aqui
        });
    </script>
</body>
</html>
