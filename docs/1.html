<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultados de busca</title>
    <style>
        body {
            background-color: #141414;
            color: #fff;
            font-family: Arial, sans-serif;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        
        .header h1 {
            font-size: 24px;
        }
        
        .search-results {
            background-color: #1e1e1e;
            padding: 20px;
        }
        
        .search-results h2 {
            font-size: 18px;
            margin-bottom: 10px;
        }
        
        .search-results p {
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Resultados da busca</h1>
            <a href="https://solidtorrents.to/search?q=dublado&sort=date" target="_blank">Ver tudo</a>
        </div>
        
        <div class="search-results" id="search-results">
            <!-- Aqui serão exibidos os resultados da busca -->
        </div>
    </div>

    <script>
        fetch('https://solidtorrents.to/search?q=dublado&sort=date')
            .then(function(response) {
                return response.text();
            })
            .then(function(html) {
                var resultsContainer = document.getElementById('search-results');
                resultsContainer.innerHTML = html;
            })
            .catch(function(error) {
                console.log('Ocorreu um erro:', error);
            });
    </script>
</body>
</html>
