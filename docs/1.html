<!DOCTYPE html>
<html>
<head><!DOCTYPE html>
<html>
<head>
  <title>Captura de link M3U/M3U8</title>
</head>
<body>
  <button id="captureButton">Capturar link M3U/M3U8</button>

  <script>
    document.getElementById("captureButton").addEventListener("click", function() {
      var iframeUrl = "https://embedflix.net/tv/br-globo-news-hd"; // Substitua pela URL do iframe

      fetch(iframeUrl)
        .then(response => response.text())
        .then(data => {
          var match = data.match(/(https?:\/\/[^\s]+)/);
          if (match && match.length > 0) {
            var videoUrl = match[0];
            console.log("Link do vídeo em formato M3U/M3U8:", videoUrl);
          } else {
            console.log("Não foi possível encontrar o link do vídeo.");
          }
        })
        .catch(error => {
          console.log("Ocorreu um erro ao obter o link do vídeo:", error);
        });
    });
  </script>
</body>
</html>

  <title>Reprodução de vídeo e download</title>
</head>
<body>
  <video id="videoPlayer" controls></video>
  <button id="downloadButton">Download do vídeo</button>

  <script src="https://cdn.jsdelivr.net/npm/downloader-helper/dist/downloader.min.js"></script>
  <script>
    var videoUrl = "https://sinalpublico.com/player3/ch.php?canal=globonews"; // Substitua pela URL do vídeo

    var videoPlayer = document.getElementById("videoPlayer");
    var downloadButton = document.getElementById("downloadButton");

    videoPlayer.src = videoUrl;

    downloadButton.addEventListener("click", function() {
      var downloader = new DownloaderHelper(videoUrl, "video.mp4"); // Substitua "video.mp4" pelo nome desejado para o arquivo de vídeo

      downloader.start()
        .then(() => {
          console.log("Download do vídeo concluído com sucesso");
        })
        .catch(error => {
          console.error("Ocorreu um erro durante o download do vídeo:", error);
        });
    });
  </script>
</body>
</html>
