<!DOCTYPE html>
<html>
<head>
    <title>TV DO BILL - Modo Noturno</title>
    <style>
        body {
            color: #ffffff;
            background-color: #1c1c1c;
            transition: color 0.3s ease-in-out, background-color 0.3s ease-in-out;
        }

        h1 {
            color: #d32f2f;
            text-align: center;
            font-size: 32px;
            margin-top: 20px;
        }

        .container {
            display: flex;
            flex-direction: row;
        }

        .channel-list {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            max-height: 500px;
            overflow-y: auto;
        }

        .channel-list button {
            margin-bottom: 5px;
            padding: 10px;
            font-size: 16px;
            width: 200px;
            height: 40px;
            background-color: #1c1c1c;
            color: #ffffff;
            border: 1px solid #d32f2f;
            transition: background-color 0.3s ease-in-out, color 0.3s ease-in-out;
        }

        .channel-list button:hover {
            background-color: #d32f2f;
            color: #ffffff;
        }

        .video-player {
            margin-right: 20px;
        }
    </style>
    <link href="https://vjs.zencdn.net/7.15.4/video-js.css" rel="stylesheet">
    <script src="https://vjs.zencdn.net/7.15.4/video.js"></script>
</head>
<body>
    <h1>TV DO BILL</h1>
    <div class="container">
        <div class="channel-list" id="channel-list"></div>
        <video id="video-player" class="video-js vjs-default-skin" controls></video>
    </div>

    <script>
        // URL da lista de canais
        var playlistURL = 'https://raw.githubusercontent.com/listadobill/tv/main/tvdobill.m3u';

        // Função para carregar a lista de canais
        function loadChannelList() {
            var channelList = document.getElementById('channel-list');

            // Faz uma requisição para obter a lista de canais
            var xhr = new XMLHttpRequest();
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4 && xhr.status === 200) {
                    var channels = parseM3U(xhr.responseText);

                    // Ordena os canais em ordem alfabética
                    channels.sort(function(a, b) {
                        return a.name.localeCompare(b.name);
                    });

                    // Cria os botões para cada canal
                    channels.forEach(function(channel) {
                        var button = document.createElement('button');
                        button.textContent = channel.name;
                        button.addEventListener('click', function() {
                            playChannel(channel.url);
                        });
                        channelList.appendChild(button);
                    });
                }
            };
            xhr.open('GET', playlistURL, true);
            xhr.send();
        }

        // Função para analisar o arquivo M3U e extrair os canais
        function parseM3U(m3uData) {
            var channels = [];
            var lines = m3uData.split('\n');
            var channelName = null;
            var channelURL = null;

            lines.forEach(function(line) {
                line = line.trim();

                if (line.startsWith('#EXTINF:')) {
                    channelName = line.substring(line.indexOf(',') + 1);
                } else if (line.startsWith('http')) {
                    channelURL = line;
                }

                if (channelName && channelURL) {
                    channels.push({ name: channelName, url: channelURL });
                    channelName = null;
                    channelURL = null;
                }
            });

            return channels;
        }

        // Função para reproduzir o canal selecionado
        function playChannel(url) {
            var videoPlayer = videojs('video-player');
            videoPlayer.src(url);
            videoPlayer.play();
        }

        // Carrega a lista de canais ao carregar a página
        window.addEventListener('load', loadChannelList);
    </script>
</body>
</html>
