<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Pesquisa no Solid Torrents</title>
  <style>
    body {
      font-family: Arial, sans-serif;
    }
    #search-form {
      text-align: center;
      margin-top: 50px;
    }
    #search-form input[type="text"] {
      padding: 10px;
      width: 300px;
      font-size: 16px;
    }
    #search-form input[type="submit"] {
      padding: 10px 20px;
      font-size: 16px;
      background-color: #558cb7;
      color: #fff;
      border: none;
      cursor: pointer;
    }
    #results {
      margin-top: 50px;
    }
    #results ul {
      list-style-type: none;
      padding: 0;
    }
    #results ul li {
      margin-bottom: 10px;
    }
    #results h2 {
      text-align: center;
    }
  </style>
  <script>
    function searchSolidTorrents() {
      var query = document.getElementById("search-input").value;
      var url = "https://solidtorrents.to/?q=" + encodeURIComponent(query);
      
      fetch(url)
        .then(response => response.text())
        .then(data => {
          var parser = new DOMParser();
          var htmlDoc = parser.parseFromString(data, "text/html");
          var searchResults = htmlDoc.querySelectorAll(".table-list > tbody > tr");
          
          var resultsContainer = document.getElementById("results");
          resultsContainer.innerHTML = "";
          
          var ul = document.createElement("ul");
          
          searchResults.forEach(function(result) {
            var li = document.createElement("li");
            li.textContent = result.textContent;
            ul.appendChild(li);
          });
          
          resultsContainer.appendChild(ul);
        })
        .catch(error => {
          console.log("Ocorreu um erro: ", error);
        });
    }
  </script>
</head>
<body>
  <div id="search-form">
    <input type="text" id="search-input" placeholder="Digite sua pesquisa">
    <input type="button" value="Buscar" onclick="searchSolidTorrents()">
  </div>
  
  <div id="results">
    <!-- Os resultados de pesquisa serão exibidos aqui -->
  </div>
</body>
</html>
