<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TV DO BILL - Pesquise seu Filme, Série, Desenho, Novela, e muito mais</title>
  <style>
    /* Estilos para o tema inspirado no Netflix */
    body {
      background-color: #000;
      color: #fff;
      font-family: 'Helvetica Neue', Arial, sans-serif;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
      text-align: center;
    }

    h1 {
      font-size: 36px;
      margin-bottom: 10px;
      color: #ff0000;
    }

    h2 {
      font-size: 24px;
      margin-bottom: 20px;
    }

    iframe {
      width: 100%;
      height: 600px;
      border: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>TV DO BILL</h1>
    <h2>Pesquise seu Filme, Série, Desenho, Novela, e muito mais</h2>
    <iframe src="https://solidtorrents.to/search?q=dublado&sort=date"></iframe>
  </div>

  <h1>Reprodutor de Torrent</h1>
  <div id="player"></div>

  <script src="https://cdn.jsdelivr.net/npm/webtorrent/webtorrent.min.js"></script>
  <script>
    var client = new WebTorrent();

    var torrentId = 'https://solidtorrents.to/search?q=dublado&sort=date';

    client.add(torrentId, function (torrent) {
      var file = torrent.files.find(function (file) {
        return file.name.endsWith('.torrent');
      });

      file.getBlobURL(function (err, url) {
        if (err) throw err;

        var video = document.createElement('video');
        video.controls = true;
        video.src = url;
        video.style.width = '100%';
        video.style.height = 'auto';

        document.getElementById('player').appendChild(video);
      });
    });
  </script>
</body>
</html>
