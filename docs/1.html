<!DOCTYPE html>
<html>
<head>
  <title>TV DO BILL</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      color: #fff;
      background-color: #141414;
    }

    .header {
      background-color: transparent;
      padding: 20px;
      text-align: center;
    }

    .header h1 {
      font-size: 36px;
      margin: 0;
      font-weight: bold;
      color: #e73844;
    }

    .header p {
      font-size: 18px;
      margin: 10px 0 0;
      font-weight: bold;
    }

    .button-grid {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      margin-top: 50px;
    }

    .button-frame {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 10px;
      border: 2px solid #fff;
      transition: border-color 0.3s ease;
      margin: 0 10px;
    }

    .button-frame:hover,
    .button-frame:focus {
      border-color: #c41e2d;
    }

    .button-frame button {
      background-color: #e73844;
      color: #fff;
      border: none;
      padding: 10px 20px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    .button-frame button:hover,
    .button-frame button:focus {
      background-color: #c41e2d;
    }

    .iframe-container {
      margin-top: 20px;
      text-align: center;
    }

    .iframe-container iframe {
      width: 100%;
      height: 500px;
      border: none;
    }

    @media (max-width: 768px) {
      .button-grid {
        flex-wrap: wrap;
      }
    }
  </style>
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body>
  <div class="header">
    <h1 style="color: #e73844;">TV DO BILL</h1>
    <p>A TV stream grátis de verdade</p>
  </div>

  <div class="button-grid">
    <div class="button-frame">
      <button onclick="loadPage('https://listadobill.github.io/tv/iptv_org_br.html')">IPTV ORG BR</button>
    </div>

    <div class="button-frame">
      <button onclick="loadPage('https://listadobill.github.io/tv/tvdobill')">TV DO BILL - SMART</button>
    </div>

    <div class="button-frame">
      <button onclick="loadPage('https://listadobill.github.io/tv/provisoria')">LISTA PROVISÓRIA</button>
    </div>

    <div class="button-frame">
      <button onclick="loadPage('https://listadobill.github.io/tv/smarttv_plutotvbr')">Pluto TV BR</button>
    </div>

    <!-- Nova entrada adicionada -->
    <div class="button-frame">
      <button onclick="loadPage('https://warezcdn.com/listing.php?type=movies')">FILMES E SÉRIES - SERVIDOR 1</button>
    </div>
  </div>

  <div class="iframe-container">
    <iframe id="contentFrame"></iframe>
  </div>

  <script>
    function loadPage(url) {
      document.getElementById('contentFrame').src = url;
    }
  </script>
</body>
</html>
