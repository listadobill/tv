<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>TV DO BILL</title>
    <style>
        body {
            display: flex;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #000;
            color: #fff;
        }

        #container {
            display: flex;
            flex-direction: row;
            height: 100%;
            overflow: hidden;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
        }

        #channel-list {
            width: 300px;
            background-color: #222;
            overflow-y: auto;
            padding: 20px;
            box-sizing: border-box;
        }

        #channel-list h2 {
            font-size: 20px;
            margin: 0;
            color: #f00;
            text-align: center;
        }

        #channel-list p {
            font-size: 16px;
            margin: 0;
            color: #fff;
            text-align: center;
        }

        #channel-list button {
            display: block;
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            background-color: transparent;
            border: none;
            text-align: left;
            font-size: 16px;
            color: #fff;
            cursor: pointer;
            transition: background-color 0.3s, color 0.3s;
        }

        #channel-list button:hover,
        #channel-list button:focus {
            background-color: #f00;
            color: #000;
        }

        #iptv-player-container {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #111;
            padding: 20px;
            position: relative;
        }

        #iptv-player {
            width: 100%;
            height: 100%;
        }

        #reconnect-overlay {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 30px;
            height: 30px;
            background-color: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #reconnect-overlay::after {
            content: "";
            width: 10px;
            height: 10px;
            border: 2px solid #fff;
            border-right-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        #fullscreen-reminder {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            color: yellow;
            text-align: center;
            z-index: 1; /* Coloque um valor alto de z-index para trazer o elemento para frente */
        }
    </style>
</head>
<body>
    <div id="fullscreen-reminder">Para abrir em tela cheia, clique no botão do canto inferior direito do reprodutor. O botão se parece com uma janelinha, igual no Youtube.</div>
    <div id="container">
        <div id="channel-list">
            <h2>TV DO BILL</h2>
            <p>A TV de Graça de Verdade!</p>
            <div id="channel-buttons"></div>
        </div>
        <div id="iptv-player-container">
            <div id="reconnect-overlay"></div>
            <video id="iptv-player" controls autoplay></video>
        </div>
    </div>

    <script>
        // O restante do seu código JavaScript aqui...
    </script>
</body>
</html>
