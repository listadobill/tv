<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultado da busca</title>
    <style>
        .search-box {
            width: 400px;
            margin: 20px auto;
            padding: 10px;
            border: 1px solid #ccc;
            text-align: center;
        }
        .search-results {
            width: 400px;
            margin: 0 auto;
            padding: 10px;
            border: 1px solid #ccc;
        }
    </style>
</head>
<body>
    <div class="search-box">
        <h2>Realizar busca</h2>
        <form id="search-form">
            <input type="text" id="search-query" placeholder="Digite sua busca">
            <button type="submit">Buscar</button>
        </form>
    </div>

    <div class="search-results" id="search-results">
        <!-- Aqui serão exibidos os resultados da busca -->
    </div>

    <script>
        document.getElementById('search-form').addEventListener('submit', function(e) {
            e.preventDefault(); // Impede o envio do formulário

            var query = document.getElementById('search-query').value; // Obtém o valor da busca

            // Faz a requisição para obter os resultados da busca
            fetch('https://solidtorrents.to/?q=' + encodeURIComponent(query))
                .then(function(response) {
                    return response.text(); // Converte a resposta para texto
                })
                .then(function(html) {
                    var resultsContainer = document.getElementById('search-results');
                    resultsContainer.innerHTML = html; // Insere o HTML dos resultados na caixa
                })
                .catch(function(error) {
                    console.log('Ocorreu um erro:', error);
                });
        });
    </script>
</body>
</html>
