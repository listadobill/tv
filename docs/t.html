<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>TV DO BILL</title>
    <style>
        body {
            display: flex;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #111;
            color: #fff;
        }

        #container {
            display: flex;
            flex-direction: row;
            height: 100%;
            overflow: hidden;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
        }

        #channel-list {
            width: 300px;
            background-color: #000;
            overflow-y: auto;
            padding: 20px;
            margin-top: 60px; /* Ajuste a margem superior conforme necessário */
            box-sizing: border-box;
        }

        #channel-list h1 {
            font-size: 24px;
            margin: 0;
            color: #fff;
        }

        #channel-list h2 {
            font-size: 18px;
            margin-top: 10px;
            margin-bottom: 0;
            color: #888;
        }

        #channel-list button {
            display: block;
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            background-color: transparent;
            border: none;
            text-align: left;
            font-size: 16px;
            color: #fff;
            cursor: pointer;
            transition: background-color 0.3s, color 0.3s;
        }

        #channel-list button:hover,
        #channel-list button:focus {
            background-color: #fff;
            color: #000;
        }

        #iptv-player-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #000;
            padding: 20px;
        }

        #iptv-player {
            width: 100%;
            max-width: 800px;
            height: auto;
        }

        #fullscreen-button {
            font-size: 20px;
            padding: 10px 20px;
            background-color: #e50914;
            border: none;
            color: #fff;
            cursor: pointer;
        }

        #fixed-content {
            position: fixed;
            top: 20px;
            left: 20px;
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="channel-list">
            <div id="fixed-content">
                <h1>TV DO BILL</h1>
                <h2>A TV Stream de Graça de Verdade!</h2>
            </div>
            <div id="channel-buttons"></div>
        </div>
        <div id="iptv-player-container">
            <video id="iptv-player" controls loop></video>
            <button id="fullscreen-button" onclick="toggleFullscreen()">PARA ABRIR TELA CHEIA CLIC NO CANTO INFERIOR DIREITO DA TELA DE REPRODUÇÃO</button>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            var playlistUrl = "https://raw.githubusercontent.com/listadobill/tv/main/c.m3u";
            var channelButtonsContainer = document.getElementById("channel-buttons");
            var videoPlayer = document.getElementById("iptv-player");

            fetch(playlistUrl)
                .then(function(response) {
                    return response.text();
                })
                .then(function(data) {
                    var lines = data.split("\n");
                    var channels = [];

                    for (var i = 0; i < lines.length; i++) {
                        var line = lines[i].trim();

                        if (line.startsWith("#EXTINF:")) {
                            var name = line.split(",")[1];
                            var url = lines[i+1].trim();
                            channels.push({ name: name, url: url });
                        }
                    }

                    channels.sort(function(a, b) {
                        return a.name.localeCompare(b.name);
                    });

                    channels.forEach(function(channel) {
                        var button = document.createElement("button");
                        button.textContent = channel.name.toUpperCase();
                        button.addEventListener("mouseover", function() {
                            button.style.backgroundColor = "#fff";
                            button.style.color = "#000";
                        });
                        button.addEventListener("mouseout", function() {
                            button.style.backgroundColor = "transparent";
                            button.style.color = "#fff";
                        });
                        button.addEventListener("click", function() {
                            Channel(channel.url);
                        });
                        channelButtonsContainer.appendChild(button);
                    });
                })
                .catch(function(error) {
                    console.error("Erro ao carregar a playlist IPTV:", error);
                });

            function Channel(url) {
                videoPlayer.src = url;
                videoPlayer.play();
            }

            function toggleFullscreen() {
                if (videoPlayer.requestFullscreen) {
                    if (!document.fullscreenElement) {
                        videoPlayer.requestFullscreen();
                    } else {
                        document.exitFullscreen();
                    }
                } else if (videoPlayer.mozRequestFullScreen) { // Firefox
                    if (!document.mozFullScreenElement) {
                        videoPlayer.mozRequestFullScreen();
                    } else {
                        document.mozCancelFullScreen();
                    }
                } else if (videoPlayer.webkitRequestFullscreen) { // Chrome, Safari and Opera
                    if (!document.webkitFullscreenElement) {
                        videoPlayer.webkitRequestFullscreen();
                    } else {
                        document.webkitExitFullscreen();
                    }
                } else if (videoPlayer.msRequestFullscreen) { // IE/Edge
                    if (!document.msFullscreenElement) {
                        videoPlayer.msRequestFullscreen();
                    } else {
                        document.msExitFullscreen();
                    }
                }
            }
        });
    </script>
</body>
</html>
