<!DOCTYPE html>
<html>
<head>
  <title>Busca de Filmes e Séries no Internet Archive</title>
  <style>
    body {
      background-color: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
    }

    h1 {
      text-align: center;
      margin: 30px 0;
    }

    #searchForm {
      text-align: center;
      margin-bottom: 30px;
    }

    #searchInput {
      padding: 10px;
      font-size: 16px;
    }

    #searchButton {
      padding: 10px 20px;
      font-size: 16px;
      background-color: #e50914;
      color: #fff;
      border: none;
      cursor: pointer;
    }

    #loading {
      display: none;
      text-align: center;
      margin: 20px;
      font-style: italic;
    }

    #results {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
    }

    .cover {
      width: 150px;
      height: 225px;
      margin: 10px;
      text-align: center;
      position: relative;
    }

    .cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 5px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
    }

    .cover a {
      text-decoration: none;
      color: #fff;
    }

    .cover a:hover {
      text-decoration: underline;
    }

    .cover .preview {
      display: none;
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.8);
      border-radius: 5px;
      opacity: 0.9;
      transition: opacity 0.3s ease;
      overflow: hidden;
    }

    .cover:hover .preview {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .cover .preview img {
      max-width: 80%;
      max-height: 80%;
    }

    .cover .preview p {
      margin-top: 10px;
      font-size: 14px;
      font-weight: bold;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>Busca de Filmes e Séries no Internet Archive</h1>
  
  <form id="searchForm">
    <input type="text" id="searchInput" placeholder="Digite o termo de busca">
    <button type="button" id="searchButton" onclick="searchMovies()">Buscar</button>
  </form>

  <div id="loading">Carregando...</div>
  <div id="results"></div>

  <script>
    function searchMovies() {
      var searchQuery = document.getElementById("searchInput").value;

      var url = "https://archive.org/advancedsearch.php?q=";
      url += encodeURIComponent(searchQuery);
      url += "&and[]=mediatype%3A%22movies%22&and[]=languageSorter%3A%22Portuguese%22&sort=-reviewdate&page=2&output=json";

      document.getElementById("loading").style.display = "block";

      fetch(url)
        .then(function(response) {
          return response.json();
        })
        .then(function(data) {
          document.getElementById("loading").style.display = "none";
          displayResults(data.response.docs);
        })
        .catch(function(error) {
          console.log(error);
        });
    }

    function displayResults(results) {
      var resultsContainer = document.getElementById("results");
      resultsContainer.innerHTML = "";

      results.forEach(function(result) {
        var coverUrl = "https://archive.org/services/img/" + result.identifier;
        var title = result.title;
        var itemUrl = "https://archive.org/details/" + result.identifier;

        var coverDiv = document.createElement("div");
        coverDiv.className = "cover";

        var coverLink = document.createElement("a");
        coverLink.href = itemUrl;
        coverLink.target = "_blank";

        var coverImg = document.createElement("img");
        coverImg.src = coverUrl;
        coverImg.alt = title;

        var previewDiv = document.createElement("div");
        previewDiv.className = "preview";

        var previewImg = document.createElement("img");
        previewImg.src = coverUrl;
        previewImg.alt = title;

        var previewText = document.createElement("p");
        previewText.textContent = title;

        previewDiv.appendChild(previewImg);
        previewDiv.appendChild(previewText);

        coverLink.appendChild(coverImg);
        coverLink.appendChild(previewDiv);
        coverDiv.appendChild(coverLink);
        resultsContainer.appendChild(coverDiv);
      });
    }

    // Previsualização na carga inicial da página
    window.addEventListener("load", function() {
      var initialSearchQuery = "movies"; // Termo de busca inicial
      document.getElementById("searchInput").value = initialSearchQuery;
      searchMovies();
    });
  </script>
</body>
</html>
