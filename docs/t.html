<!DOCTYPE html>
<html>
<head>
    <title>Listas IPTV</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
    <h1>Listas IPTV</h1>

    <div>
        <textarea id="m3uContent" rows="10" cols="50"></textarea>
    </div>

    <script>
        function loadM3UContent() {
            var catiptvURL = "https://list.iptvcat.com/my_list/61173e0c39375c2a65a69fd1466e40bc.m3u8";
            var iptvorgURL = "https://iptv-org.github.io/iptv/index.country.m3u";
            var plutoURL = "https://i.mjh.nz/PlutoTV/br.m3u8";

            var urls = [catiptvURL, iptvorgURL, plutoURL];
            var allChannels = [];

            var requestsCompleted = 0;

            urls.forEach(function(url) {
                $.get(url, function(data) {
                    var lines = data.split("\n");

                    lines.forEach(function(line) {
                        if (line.startsWith("#EXTINF")) {
                            var channelInfo = line.split(",");
                            var channelName = channelInfo[1];
                            allChannels.push(channelName);
                        }
                    });

                    requestsCompleted++;

                    if (requestsCompleted === urls.length) {
                        var content = "#EXTM3U\n";
                        allChannels.sort();
                        allChannels.forEach(function(channel) {
                            content += "#EXTINF:-1," + channel + "\n";
                        });

                        document.getElementById('m3uContent').value = content;
                    }
                });
            });
        }

        loadM3UContent();
    </script>
</body>
</html>
