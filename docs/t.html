<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>TV DO BILL</title>
    <style>
        body {
            display: flex;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #000;
            color: #fff;
        }

        #container {
            display: flex;
            flex-direction: row;
            height: 100%;
            overflow: hidden;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
        }

        #channel-list {
            width: 300px;
            background-color: #222;
            overflow-y: auto;
            padding: 20px;
            box-sizing: border-box;
        }

        #channel-list h2 {
            font-size: 20px;
            margin: 0;
            color: #f00;
            text-align: center;
        }

        #channel-list p {
            font-size: 16px;
            margin: 0;
            color: #fff;
            text-align: center;
        }

        #channel-list button {
            display: block;
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            background-color: transparent;
            border: none;
            text-align: left;
            font-size: 16px;
            color: #fff;
            cursor: pointer;
            transition: background-color 0.3s, color 0.3s;
        }

        #channel-list button:hover,
        #channel-list button:focus {
            background-color: #f00;
            color: #000;
        }

        #iptv-player-container {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #111;
            padding: 20px;
        }

        #iptv-player {
            width: 100%;
            height: 100%;
        }

        #fullscreen-reminder {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            color: #fff;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="fullscreen-reminder">Para abrir em tela cheia, clique no botão do canto inferior direito do reprodutor. O botão se parece com uma janelinha, igual no Youtube.</div>
    <div id="container">
        <div id="channel-list">
            <h2>TV DO BILL</h2>
            <p>A TV de Graça de Verdade!</p>
            <div id="channel-buttons"></div>
        </div>
        <div id="iptv-player-container">
            <video id="iptv-player" controls loop></video>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            var playlistUrl = "https://raw.githubusercontent.com/listadobill/tv/main/c.m3u";
            var channelButtonsContainer = document.getElementById("channel-buttons");
            var videoPlayer = document.getElementById("iptv-player");

            fetch(playlistUrl)
                .then(function(response) {
                    return response.text();
                })
                .then(function(data) {
                    var lines = data.split("\n");
                    var channels = [];

                    for (var i = 0; i < lines.length; i++) {
                        var line = lines[i].trim();

                        if (line.startsWith("#EXTINF:")) {
                            var name = line.split(",")[1];
                            var url = lines[i+1].trim();
                            channels.push({ name: name, url: url });
                        }
                    }

                    channels.sort(function(a, b) {
                        return a.name.localeCompare(b.name);
                    });

                    channels.forEach(function(channel) {
                        var button = document.createElement("button");
                        button.textContent = channel.name.toUpperCase();
                        button.addEventListener("click", function() {
                            Channel(channel.url);
                        });
                        channelButtonsContainer.appendChild(button);
                    });
                })
                .catch(function(error) {
                    console.error("Erro ao carregar a playlist IPTV:", error);
                });

            function Channel(url) {
                videoPlayer.src = url;
                videoPlayer.play();
            }
        });
    </script>
</body>
</html>
