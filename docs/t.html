<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Player de IPTV</title>
  <link rel="stylesheet" href="https://cdn.plyr.io/3.6.8/plyr.css">
  <style>
    body {
      margin: 0;
      padding: 0;
    }
    #player {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div id="player">
    <video id="videoPlayer" controls></video>
    <div id="channelList"></div>
  </div>

  <script src="https://cdn.plyr.io/3.6.8/plyr.js"></script>
  <script>
    const videoPlayer = document.getElementById('videoPlayer');
    const channelList = document.getElementById('channelList');
    const playlistUrl = 'https://raw.githubusercontent.com/listadobill/tv/main/c.m3u';
    let channels = [];
    let currentChannelIndex = 0;

    fetch(playlistUrl)
      .then(response => response.text())
      .then(data => {
        channels = parsePlaylistData(data);
        renderChannelList();
        playChannel(currentChannelIndex);
      })
      .catch(error => {
        console.error('Failed to fetch playlist:', error);
      });

    function parsePlaylistData(data) {
      const lines = data.split('\n');
      const channels = [];
      let channel = {};

      lines.forEach(line => {
        line = line.trim();

        if (line.startsWith('#EXTINF:')) {
          const [, title] = line.split('#EXTINF:-1,');
          channel.title = title;
        } else if (line.startsWith('http')) {
          channel.url = line;
          channels.push(channel);
          channel = {};
        }
      });

      return channels;
    }

    function renderChannelList() {
      channelList.innerHTML = '';
      channels.forEach((channel, index) => {
        const button = document.createElement('button');
        button.textContent = channel.title;
        button.addEventListener('click', () => playChannel(index));
        channelList.appendChild(button);
      });
    }

    function playChannel(index) {
      if (index >= 0 && index < channels.length) {
        const channel = channels[index];
        videoPlayer.src = channel.url;
        currentChannelIndex = index;
      }
    }

    const player = new Plyr(videoPlayer);

    player.on('ended', () => {
      currentChannelIndex++;
      if (currentChannelIndex >= channels.length) {
        currentChannelIndex = 0;
      }
      playChannel(currentChannelIndex);
    });

    player.on('error', () => {
      playChannel(currentChannelIndex);
    });

    player.on('click', () => {
      if (player.fullscreen.enabled) {
        player.fullscreen.toggle();
      }
    });
  </script>
</body>
</html>
