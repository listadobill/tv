<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Player de IPTV</title>
  <style>
    body {
      margin: 0;
      padding: 0;
    }
    #player {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div id="player">
    <video id="videoPlayer" controls autoplay></video>
    <div id="channelList"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script>
    const videoPlayer = document.getElementById('videoPlayer');
    const channelList = document.getElementById('channelList');
    const playlistUrl = 'https://raw.githubusercontent.com/listadobill/tv/main/c.m3u';
    let channels = [];
    let currentChannelIndex = 0;

    fetch(playlistUrl)
      .then(response => response.text())
      .then(data => {
        channels = parsePlaylistData(data);
        renderChannelList();
        playChannel(currentChannelIndex);
      })
      .catch(error => {
        console.error('Failed to fetch playlist:', error);
      });

    function parsePlaylistData(data) {
      const lines = data.split('\n');
      const channels = [];
      let channel = {};

      lines.forEach(line => {
        line = line.trim();

        if (line.startsWith('#EXTINF:')) {
          const [, title] = line.split('#EXTINF:-1,');
          channel.title = title;
        } else if (line.startsWith('http')) {
          channel.url = line;
          channels.push(channel);
          channel = {};
        }
      });

      return channels;
    }

    function renderChannelList() {
      channelList.innerHTML = '';
      channels.forEach((channel, index) => {
        const button = document.createElement('button');
        button.textContent = channel.title;
        button.addEventListener('click', () => playChannel(index));
        channelList.appendChild(button);
      });
    }

    function playChannel(index) {
      if (index >= 0 && index < channels.length) {
        const channel = channels[index];
        
        if (Hls.isSupported()) {
          const hls = new Hls();
          hls.loadSource(channel.url);
          hls.attachMedia(videoPlayer);
          hls.on(Hls.Events.MANIFEST_PARSED, () => {
            videoPlayer.play();
          });
          hls.on(Hls.Events.ERROR, (event, data) => {
            console.error('HLS error:', data);
            playChannel(currentChannelIndex + 1);
          });
        } else if (videoPlayer.canPlayType('application/vnd.apple.mpegurl')) {
          videoPlayer.src = channel.url;
          videoPlayer.addEventListener('loadedmetadata', () => {
            videoPlayer.play();
          });
          videoPlayer.addEventListener('error', () => {
            console.error('Video player error');
            playChannel(currentChannelIndex + 1);
          });
        } else {
          console.error('HLS is not supported');
          playChannel(currentChannelIndex + 1);
        }

        currentChannelIndex = index;
      }
    }

    videoPlayer.addEventListener('ended', () => {
      playChannel(currentChannelIndex + 1);
    });

    videoPlayer.addEventListener('click', () => {
      if (videoPlayer.requestFullscreen) {
        videoPlayer.requestFullscreen();
      } else if (videoPlayer.mozRequestFullScreen) {
        videoPlayer.mozRequestFullScreen();
      } else if (videoPlayer.webkitRequestFullscreen) {
        videoPlayer.webkitRequestFullscreen();
      } else if (videoPlayer.msRequestFullscreen) {
        videoPlayer.msRequestFullscreen();
      }
    });
  </script>
</body>
</html>
