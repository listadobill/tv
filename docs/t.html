<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Player IPTV</title>
    <style>
        body {
            display: flex;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        #container {
            display: flex;
            flex-direction: row;
            height: 100%;
            overflow: hidden;
        }

        #channel-list {
            width: 300px;
            background-color: #f0f0f0;
            overflow-y: auto;
            padding: 20px;
            box-sizing: border-box;
        }

        #channel-list button {
            display: block;
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            background-color: #ffffff;
            border: none;
            text-align: left;
            font-size: 16px;
            cursor: pointer;
        }

        #channel-list button:hover {
            background-color: #e0e0e0;
        }

        #iptv-player-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #iptv-player {
            width: 80%;
            max-width: 800px;
        }

        #fullscreen-button {
            font-size: 20px;
            padding: 20px;
            background-color: #007bff;
            border: none;
            color: #ffffff;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="channel-list">
            <h2>Lista de Canais IPTV</h2>
            <div id="channel-buttons"></div>
        </div>
        <div id="iptv-player-container">
            <video id="iptv-player" controls></video>
            <button id="fullscreen-button" onclick="toggleFullscreen()">ABRIR TELA CHEIA</button>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            var playlistUrl = "https://raw.githubusercontent.com/listadobill/tv/main/c.m3u";
            var channelButtonsContainer = document.getElementById("channel-buttons");
            var videoPlayer = document.getElementById("iptv-player");

            fetch(playlistUrl)
                .then(function(response) {
                    return response.text();
                })
                .then(function(data) {
                    var lines = data.split("\n");
                    var channels = [];

                    for (var i = 0; i < lines.length; i++) {
                        var line = lines[i].trim();

                        if (line.startsWith("#EXTINF:")) {
                            var name = line.split(",")[1];
                            var url = lines[i+1].trim();
                            channels.push({ name: name, url: url });
                        }
                    }

                    channels.sort(function(a, b) {
                        return a.name.localeCompare(b.name);
                    });

                    channels.forEach(function(channel) {
                        var button = document.createElement("button");
                        button.textContent = channel.name.toUpperCase();
                        button.addEventListener("click", function() {
                            Channel(channel.url);
                        });
                        channelButtonsContainer.appendChild(button);
                    });
                })
                .catch(function(error) {
                    console.error("Erro ao carregar a playlist IPTV:", error);
                });

            function Channel(url) {
                videoPlayer.src = url;
                videoPlayer.play();
            }

            function toggleFullscreen() {
                if (videoPlayer.requestFullscreen) {
                    if (!document.fullscreenElement) {
                        videoPlayer.requestFullscreen();
                    } else {
                        document.exitFullscreen();
                    }
                } else if (videoPlayer.mozRequestFullScreen) { // Firefox
                    if (!document.mozFullScreenElement) {
                        videoPlayer.mozRequestFullScreen();
                    } else {
                        document.mozCancelFullScreen();
                    }
                } else if (videoPlayer.webkitRequestFullscreen) { // Chrome, Safari and Opera
                    if (!document.webkitFullscreenElement) {
                        videoPlayer.webkitRequestFullscreen();
                    } else {
                        document.webkitExitFullscreen();
                    }
                } else if (videoPlayer.msRequestFullscreen) { // IE/Edge
                    if (!document.msFullscreenElement) {
                        videoPlayer.msRequestFullscreen();
                    } else {
                        document.msExitFullscreen();
                    }
                }
            }
        });
    </script>
</body>
</html>
