<!DOCTYPE html>
<html>
<head>
    <title>TV DO BILL</title>
    <style>
        body {
            background-color: #000;
            margin: 0;
            padding: 0;
            overflow: hidden; /* Impede a exibição da barra de rolagem */
        }

        #channel-list {
            position: absolute;
            top: 0;
            left: 0;
            width: 30%;
            height: 100vh;
            z-index: 1; /* Define a ordem de empilhamento para ficar acima do player */
            overflow-y: scroll; /* Habilita a rolagem vertical */
            background-color: rgba(0, 0, 0, 0.8); /* Cor de fundo semi-transparente */
            color: #fff;
            padding: 20px;
        }

        #channel-list ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        #channel-list ul li {
            margin-bottom: 10px;
        }

        #channel-list ul li a {
            color: #fff;
            text-decoration: none;
        }

        #player {
            width: 70%;
            height: 100vh;
            position: absolute;
            top: 0;
            right: 0;
            z-index: 0; /* Define a ordem de empilhamento para ficar abaixo da lista */
        }

        .selected a,
        button:hover {
            color: #f00;
            animation: red-glow 1s infinite alternate;
        }

        @keyframes red-glow {
            0% {
                color: #fff;
            }
            100% {
                color: #f00;
            }
        }

        #button-list {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 2; /* Coloca a lista na frente do player */
            list-style: none;
            padding: 0;
            margin: 0;
        }

        #button-list li {
            margin-bottom: 10px;
        }

        #button-list li button {
            position: relative;
            background-color: transparent;
            color: #fff;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }

        #button-list li button::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7); /* Cor de fundo semi-transparente mais escura */
            z-index: -1;
            opacity: 0.8; /* Ajuste a opacidade aqui */
        }
    </style>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        $(document).ready(function() {
            var player = document.getElementById('player');
            var currentChannelIndex = 0;
            var retryCount = 0;
            var maxRetryCount = 3;

            function playChannel(channelUrl) {
                player.src = channelUrl;
                player.play();
                player.requestFullscreen();
            }

            function switchChannel(index) {
                var channels = $('#channel-list ul li a');
                channels.removeClass('selected');
                channels.eq(index).addClass('selected');
                channels.eq(index).focus();
                currentChannelIndex = index;
            }

            function playNextChannel() {
                var channels = $('#channel-list ul li a');
                var nextIndex = currentChannelIndex + 1;

                if (nextIndex >= channels.length) {
                    nextIndex = 0;
                }

                switchChannel(nextIndex);
                playChannel(channels.eq(nextIndex).attr('href'));
            }

            $(document).keydown(function(e) {
                var key = e.which;

                if (key === 38) { // Seta para cima
                    e.preventDefault();
                    var prevIndex = currentChannelIndex - 1;

                    if (prevIndex < 0) {
                        prevIndex = $('#channel-list ul li a').length - 1;
                    }

                    switchChannel(prevIndex);
                } else if (key === 40) { // Seta para baixo
                    e.preventDefault();
                    var nextIndex = currentChannelIndex + 1;

                    if (nextIndex >= $('#channel-list ul li a').length) {
                        nextIndex = 0;
                    }

                    switchChannel(nextIndex);
                } else if (key === 37) { // Seta para a esquerda
                    e.preventDefault();
                    player.currentTime -= 10;
                } else if (key === 39) { // Seta para a direita
                    e.preventDefault();
                    player.currentTime += 10;
                } else if (key === 32) { // Espaço (play/pause)
                    e.preventDefault();

                    if (player.paused) {
                        player.play();
                    } else {
                        player.pause();
                    }
                } else if (key === 13) { // Enter (abrir em tela cheia)
                    e.preventDefault();
                    player.requestFullscreen();
                }
            });

            player.addEventListener('ended', function() {
                playNextChannel();
            });

            player.addEventListener('error', function() {
                retryCount++;

                if (retryCount <= maxRetryCount) {
                    playChannel($('#channel-list ul li a').eq(currentChannelIndex).attr('href'));
                } else {
                    playNextChannel();
                    retryCount = 0;
                }
            });

            $.get('https://raw.githubusercontent.com/listadobill/tv/main/c.m3u', function(data) {
                var lines = data.split('\n');
                var channelList = $('#channel-list ul');

                for (var i = 0; i < lines.length; i++) {
                    if (lines[i].startsWith('#EXTINF')) {
                        var channelInfo = lines[i].substring(lines[i].indexOf(',') + 1);
                        var channelLink = lines[i + 1];

                        var listItem = $('<li></li>');
                        var link = $('<a></a>').attr('href', channelLink).text(channelInfo);

                        link.click(function(event) {
                            event.preventDefault();
                            playChannel($(this).attr('href'));
                        });

                        listItem.append(link);
                        channelList.append(listItem);
                    }
                }

                var channels = $('#channel-list ul li a');

                if (channels.length > 0) {
                    switchChannel(0);
                    playChannel(channels.eq(0).attr('href'));
                }
            });
        });
    </script>
</head>
<body>
    <ul id="button-list">
        <li><button onclick="window.location.href='https://listadobill.github.io/tv/'">CANAIS ABERTOS E FECHADOS</button></li>
        <li><button onclick="window.location.href='https://listadobill.github.io/tv/provisoria'">IPTV</button></li>
        <li><button onclick="window.location.href='https://listadobill.github.io/tv/tvdobill'">IPTV DO BILL</button></li>
        <li><button onclick="window.location.href='https://listadobill.github.io/tv/smarttv_plutotvbr.html'">PLUTO TV IPTV</button></li>
    </ul>

    <div id="channel-list">
        <ul></ul>
    </div>

    <video id="player" controls></video>
</body>
</html>
