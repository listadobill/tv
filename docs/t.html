<!DOCTYPE html>
<html>
<head>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
        }

        #channelList {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 30%;
            overflow-y: scroll;
            padding: 20px;
        }

        #channelIframe {
            position: absolute;
            left: 30%;
            top: 0;
            right: 0;
            bottom: 0;
            border: none;
        }
    </style>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        $(document).ready(function() {
            $.get("https://raw.githubusercontent.com/listadobill/tv/main/web.m3u", function(data) {
                var lines = data.split("\n");
                var channelList = $("#channelList ul");

                for (var i = 0; i < lines.length; i++) {
                    if (lines[i].startsWith("#EXTINF")) {
                        var channelInfo = lines[i].substring(lines[i].indexOf(",") + 1);
                        var channelLink = lines[i + 1];

                        var listItem = $("<li></li>");
                        var link = $("<a></a>").attr("href", channelLink).text(channelInfo);

                        listItem.append(link);
                        channelList.append(listItem);
                    }
                }
            });
        });
    </script>
</head>
<body>
    <div id="channelList">
        <ul></ul>
    </div>

    <iframe id="channelIframe" src=""></iframe>
</body>
</html>
