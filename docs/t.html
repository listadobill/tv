<!DOCTYPE html>
<html>
<head>
  <title>IPTV Player</title>
  <style>
    #channels {
      list-style-type: none;
    }

    #channels li {
      margin-bottom: 10px;
    }

    #player {
      width: 100%;
      height: 400px;
    }
  </style>
</head>
<body>
  <ul id="channels"></ul>

  <video id="player" controls></video>

  <script>
    const playlistUrl = 'https://raw.githubusercontent.com/listadobill/tv/main/c.m3u';
    const channelsList = document.getElementById('channels');
    const videoPlayer = document.getElementById('player');
    let currentChannelIndex = 0;
    let nextFragmentUrl = '';

    // Função para carregar a lista de canais
    function loadChannels() {
      fetch(playlistUrl)
        .then(response => response.text())
        .then(data => {
          const lines = data.split('\n');
          let channelName = '';
          let channelUrl = '';

          for (let i = 0; i < lines.length; i++) {
            const line = lines[i].trim();

            if (line.startsWith('#EXTINF:')) {
              channelName = line.split(',')[1];
            } else if (line.startsWith('http')) {
              channelUrl = line;
              addChannelToList(channelName, channelUrl);
            }
          }

          // Iniciar a reprodução do primeiro canal
          playChannel(0);
        })
        .catch(error => {
          console.error('Ocorreu um erro ao carregar a lista de canais:', error);
        });
    }

    // Função para adicionar um canal à lista
    function addChannelToList(name, url) {
      const listItem = document.createElement('li');
      const button = document.createElement('button');
      button.textContent = name;

      button.addEventListener('click', () => {
        playChannel(url);
      });

      listItem.appendChild(button);
      channelsList.appendChild(listItem);
    }

    // Função para reproduzir um canal
    function playChannel(url) {
      videoPlayer.src = url;
      videoPlayer.play();

      // Pré-carregar o próximo fragmento
      preloadNextFragment();

      // Evento para detectar o fim do fragmento e iniciar o próximo
      videoPlayer.addEventListener('timeupdate', checkNextFragment);

      // Evento para verificar se ocorreu algum erro na reprodução
      videoPlayer.addEventListener('error', handlePlayerError);
    }

    // Função para pré-carregar o próximo fragmento
    function preloadNextFragment() {
      const currentSource = videoPlayer.src;
      const nextSource = getNextFragmentUrl(currentSource);

      if (nextSource) {
        const nextVideo = new Audio(nextSource);
        nextVideo.load();
      }
    }

    // Função para obter a URL do próximo fragmento
    function getNextFragmentUrl(currentSource) {
      if (nextFragmentUrl) {
        return nextFragmentUrl;
      }

      const lines = currentSource.split('/');
      const currentFragmentIndex = parseInt(lines[lines.length - 1].split('.')[0]);
      const nextFragmentIndex = currentFragmentIndex + 1;

      const nextSource = lines.slice(0, -1).join('/') + '/' + nextFragmentIndex + '.ts';
      nextFragmentUrl = nextSource;

      return nextSource;
    }

    // Função para verificar o próximo fragmento e iniciar a reprodução contínua
    function checkNextFragment() {
      const currentTime = videoPlayer.currentTime;
      const duration = videoPlayer.duration;
      const threshold = 5; // Tempo em segundos antes do fim para iniciar o próximo fragmento

      if (duration - currentTime <= threshold) {
        const nextSource = getNextFragmentUrl(videoPlayer.src);

        if (nextSource) {
          videoPlayer.removeEventListener('timeupdate', checkNextFragment);
          videoPlayer.src = nextSource;
          videoPlayer.play();
          preloadNextFragment();
        }
      }
    }

    // Função para lidar com erros na reprodução do vídeo
    function handlePlayerError() {
      console.error('Ocorreu um erro na reprodução do vídeo.');

      // Reconectar e retomar a reprodução
      const currentChannelUrl = videoPlayer.src;
      playChannel(currentChannelUrl);
    }

    // Função para reproduzir o próximo canal na lista
    function playNextChannel() {
      currentChannelIndex++;

      if (currentChannelIndex >= channelsList.children.length) {
        currentChannelIndex = 0;
      }

      const nextChannelUrl = channelsList.children[currentChannelIndex].querySelector('button').textContent;
      playChannel(nextChannelUrl);
    }

    // Carregar a lista de canais ao carregar a página
    window.addEventListener('load', loadChannels);
  </script>
</body>
</html>
