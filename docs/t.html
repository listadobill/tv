<!DOCTYPE html>
<html>
<head>
    <style>
        #channel-list-container {
            height: 400px;
            width: 200px;
            overflow-y: auto;
            overflow-x: hidden;
        }

        ul {
            list-style-type: none;
            padding: 0;
        }

        li {
            margin-bottom: 10px;
        }

        .channel-button {
            display: inline-block;
            width: 150px;
            height: 40px;
            padding: 10px;
            background-color: #eaeaea;
            border: none;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            font-size: 16px;
            font-weight: bold;
            color: #333333;
        }

        .channel-button:hover {
            background-color: #dddddd;
        }

        .channel-button.selected {
            background-color: #a8dadc;
        }
    </style>
</head>
<body>
    <div id="channel-list-container">
        <ul id="channel-list">
            <!-- Use JavaScript to dynamically populate the list -->
        </ul>
    </div>

    <script>
        // Fetch the channel list from the URL
        fetch('https://raw.githubusercontent.com/listadobill/tv/main/web.m3u')
            .then(response => response.text())
            .then(data => {
                const lines = data.split('\n');
                const listElement = document.getElementById('channel-list');
                let channelName = '';
                let channelLink = '';

                // Iterate over the lines and extract channel names and links
                lines.forEach(line => {
                    if (line.startsWith('#EXTINF:-1,')) {
                        channelName = line.substring(11);
                    } else if (line.startsWith('https://')) {
                        channelLink = line;

                        const listItem = document.createElement('li');
                        const button = document.createElement('a');
                        button.className = 'channel-button';
                        button.textContent = channelName;
                        button.href = channelLink;
                        button.target = '_blank'; // Open in a new tab
                        listItem.appendChild(button);
                        listElement.appendChild(listItem);

                        // Add event listener to toggle selection
                        button.addEventListener('click', () => {
                            button.classList.toggle('selected');
                        });

                        channelName = '';
                        channelLink = '';
                    }
                });
            });
    </script>
</body>
</html>
