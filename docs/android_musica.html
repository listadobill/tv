<!DOCTYPE html>
<html>
<head>
    <title>Lista de Canais</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #141414;
            color: #fff;
        }

        h1 {
            margin-top: 20px;
            font-size: 28px;
        }

        .button-list {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 40px;
        }

        .button-list button {
            margin-bottom: 10px;
            width: 200px;
            height: 50px;
            background-color: #e50914;
            color: #fff;
            font-size: 18px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .button-list button:hover {
            background-color: #b2070f;
        }
    </style>
</head>
<body>
    <h1>Listas de Canais</h1>
    <div class="button-list">
        <button onclick="gerarArquivo()">Clicar para executar no Player IPTV</button>
        <button onclick="baixarPlayer()">BAIXE O PLAYER IPTV AQUI</button>
    </div>

    <script>
        function gerarArquivo() {
            var url = "https://iptv-org.github.io/iptv/categories/music.m3u";
            
            fetch(url)
                .then(response => response.text())
                .then(data => {
                    var filename = "canais.m3u";
                    var element = document.createElement('a');
                    element.setAttribute('href', 'data:text/plain;charset=utf-8,' + encodeURIComponent(data));
                    element.setAttribute('download', filename);
                    element.style.display = 'none';
                    document.body.appendChild(element);
                    element.click();
                    document.body.removeChild(element);
                })
                .catch(error => console.error(error));
        }

        function baixarPlayer() {
            var playerUrl = "https://drive.google.com/file/d/1vUUCdGvQVjodBOhb0ZfXizZwRJFXNgAi/view?usp=drive_link";
            window.open(playerUrl, "_blank");
        }
    </script>
</body>
</html>
