<!DOCTYPE html>
<html>
<head>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #222;
            color: #fff;
            overflow: hidden;
        }

        #channelList {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 30%;
            overflow-y: scroll;
            padding: 20px;
            background-color: #333;
        }

        #channelList ul {
            list-style: none;
            padding: 0;
        }

        #channelList li {
            margin-bottom: 10px;
            transition: background-color 0.3s ease;
        }

        #channelList li:hover {
            background-color: rgba(255, 255, 255, 0.2);
        }

        #channelList a {
            display: block;
            padding: 10px;
            color: #fff;
            text-decoration: none;
        }

        #channelList a:hover {
            color: #fff;
        }

        #channelIframeContainer {
            position: absolute;
            left: 30%;
            top: 0;
            right: 0;
            bottom: 0;
            overflow: hidden;
        }

        #channelIframe {
            width: 100%;
            height: 100%;
            border: none;
            background-color: #000;
            transform: scale(0.7);
        }

        .iframe-content {
            width: 100%;
            height: 100%;
        }
    </style>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        $(document).ready(function() {
            $.get("https://raw.githubusercontent.com/listadobill/tv/main/web.m3u", function(data) {
                var lines = data.split("\n");
                var channelList = $("#channelList ul");
                var channelIframe = $("#channelIframe");

                for (var i = 0; i < lines.length; i++) {
                    if (lines[i].startsWith("#EXTINF")) {
                        var channelInfo = lines[i].substring(lines[i].indexOf(",") + 1);
                        var channelLink = lines[i + 1];

                        var listItem = $("<li></li>");
                        var link = $("<a></a>").attr("href", channelLink).text(channelInfo);

                        listItem.append(link);
                        channelList.append(listItem);

                        link.on("click", function(e) {
                            e.preventDefault();
                            var channelUrl = $(this).attr("href");
                            openFullscreen(channelUrl);
                        });
                    }
                }

                var randomChannelIndex = Math.floor(Math.random() * channelList.children().length);
                var randomChannelLink = channelList.children().eq(randomChannelIndex).find("a").attr("href");
                openFullscreen(randomChannelLink);
            });

            function openFullscreen(url) {
                var elem = document.getElementById("channelIframe");

                if (elem.requestFullscreen) {
                    elem.requestFullscreen();
                } else if (elem.mozRequestFullScreen) { /* Firefox */
                    elem.mozRequestFullScreen();
                } else if (elem.webkitRequestFullscreen) { /* Chrome, Safari and Opera */
                    elem.webkitRequestFullscreen();
                } else if (elem.msRequestFullscreen) { /* IE/Edge */
                    elem.msRequestFullscreen();
                }

                elem.src = url;
            }
        });
    </script>
</head>
<body>
    <div id="channelList">
        <ul></ul>
    </div>

    <div id="channelIframeContainer">
        <iframe id="channelIframe" src=""></iframe>
    </div>
</body>
</html>
