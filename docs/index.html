<!DOCTYPE html>
<html>
<head>
    <title>TV DO BILL</title>
    <style>
        /* Estilos CSS para o layout */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px;
            text-align: center;
        }

        h1 {
            font-size: 36px;
            color: #e50914;
            margin-bottom: 20px;
        }

        h2 {
            font-size: 24px;
            color: #fff;
            margin-bottom: 40px;
        }

        .button {
            display: inline-block;
            padding: 12px 24px;
            background-color: #e50914;
            color: #fff;
            font-size: 18px;
            text-decoration: none;
            border: none;
            border-radius: 4px;
            transition: background-color 0.3s ease;
        }

        .button:hover {
            background-color: #b7000d;
        }

        .button:active {
            background-color: #e50914;
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>TV DO BILL</h1>
        <h2>A TV grátis para todos</h2>
        <a href="https://listadobill.github.io/tv/iptv_org_br.html" class="button">CANAIS DO IPTV ORG BRASIL</a>
    </div>
</body>
</html>
