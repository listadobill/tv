<!DOCTYPE html>
<html>

<head>
  <title>TV DO BILL</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      color: #fff;
      background-color: #141414;
    }

    .header {
      background-color: #141414;
      color: #e50914;
      padding: 20px;
      text-align: center;
    }

    .header h1 {
      font-size: 36px;
      margin: 0;
      font-weight: bold;
    }

    .header p {
      font-size: 18px;
      margin: 10px 0 0;
      font-weight: bold;
      color: #fff;
    }

    .content {
      text-align: center;
      margin-top: 50px;
    }

    .button-frame {
      display: inline-block;
      padding: 10px;
      border: 2px solid #fff;
      transition: border-color 0.3s ease;
      margin: 10px;
    }

    .button-frame:hover,
    .button-frame:focus {
      border-color: #e50914;
    }

    .button-frame img {
      max-width: 100%;
      height: auto;
    }

    .content p {
      font-size: 16px;
      color: #fff;
      margin-top: 10px;
    }

    .footer {
      background-color: #141414;
      color: #fff;
      padding: 20px;
      text-align: center;
      font-size: 14px;
    }
  </style>
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body>
  <div class="header">
    <h1>TV DO BILL</h1>
    <p>A TV stream grátis de verdade</p>
  </div>

  <div class="content">
    <div class="button-frame">
      <a href="https://listadobill.github.io/tv/plutotvbr">
        <img src="https://acontecendoaqui.com.br/wp-content/uploads/2020/08/pluto_tv_2.jpg" alt="Pluto TV Brasil">
      </a>
    </div>
    <p>Pluto TV BR</p>

    <div class="button-frame">
      <a href="https://listadobill.github.io/tv/provisoria">
        <img src="https://www.minhaoperadora.com.br/wp-content/uploads/2020/01/Confira-qual-canal-foi-o-mais-visto-da-TV-paga-em-2019.jpg" alt="Lista Provisória">
      </a>
    </div>
    <p>Lista Provisória</p>
  </div>

  <div class="footer">
    <p>É normal eventualmente um canal, vídeo ou lista não funcionar, tenha paciência</p>
  </div>
</body>

</html>
