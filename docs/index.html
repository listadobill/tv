<!DOCTYPE html>
<html>
<head>
  <title>TV DO BILL</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      color: #fff;
      background-color: #141414;
    }

    .header {
      background-color: #141414;
      color: #e50914;
      padding: 20px;
      text-align: center;
    }

    .header h1 {
      font-size: 36px;
      margin: 0;
      font-weight: bold;
    }

    .header p {
      font-size: 18px;
      margin: 10px 0 0;
      font-weight: bold;
      color: #fff;
    }

    .carousel-container {
      width: 100%;
      overflow: hidden;
      margin-top: 50px;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .carousel {
      display: flex;
      transition: transform 0.5s ease;
    }

    .button-frame {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 10px;
      border: 2px solid #fff;
      transition: border-color 0.3s ease;
      margin: 10px;
      flex: 0 0 auto;
    }

    .button-frame:hover,
    .button-frame:focus {
      border-color: #e50914;
    }

    .button-frame img {
      max-width: 80px;
      height: 80px;
    }

    .content p {
      font-size: 16px;
      color: #fff;
      margin-top: 10px;
    }

    .arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 24px;
      color: #fff;
      background-color: rgba(0, 0, 0, 0.3);
      padding: 10px;
      cursor: pointer;
    }

    .arrow.left {
      left: 10px;
    }

    .arrow.right {
      right: 10px;
    }

    .selected {
      border-color: #e50914;
    }

    .footer {
      background-color: #141414;
      color: #fff;
      padding: 20px;
      text-align: center;
      font-size: 14px;
    }
  </style>
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body>
  <div class="header">
    <h1>TV DO BILL</h1>
    <p>A TV stream grátis de verdade</p>
  </div>

  <div class="carousel-container">
    <div class="arrow left">&lt;</div>
    <div class="carousel">
      <div class="button-frame">
        <a href="https://listadobill.github.io/tv/smarttv">
          <img src="https://www.cellshop.com/12950511-large_default/smart-tv-hisense-50-50a6gsv-4k-ultra-hd-wifi-bluetooth-vidaa-u.jpg" alt="Smart TVs">
        </a>
        <p>Smart TVs</p>
      </div>
    </div>
    <div class="arrow right">&gt;</div>
  </div>

  <div class="footer">
    <p>É normal eventualmente um canal, vídeo ou lista não funcionar, tenha paciência</p>
  </div>

  <script>
    const carousel = document.querySelector('.carousel');
    const leftArrow = document.querySelector('.arrow.left');
    const rightArrow = document.querySelector('.arrow.right');
    const carouselWidth = carousel.offsetWidth;
    let buttonFrames = Array.from(document.querySelectorAll('.button-frame'));
    let currentIndex = 0;

    leftArrow.addEventListener('click', () => {
      currentIndex = (currentIndex - 1 + buttonFrames.length) % buttonFrames.length;
      scrollCarousel();
      highlightSelectedButton();
    });

    rightArrow.addEventListener('click', () => {
      currentIndex = (currentIndex + 1) % buttonFrames.length;
      scrollCarousel();
      highlightSelectedButton();
    });

    function scrollCarousel() {
      const buttonWidth = buttonFrames[0].offsetWidth;
      carousel.style.transform = `translateX(${-currentIndex * buttonWidth}px)`;
    }

    function highlightSelectedButton() {
      buttonFrames.forEach((buttonFrame, index) => {
        buttonFrame.classList.remove('selected');
        if (index === currentIndex) {
          buttonFrame.classList.add('selected');
        }
      });
    }
  </script>
</body>
</html>
