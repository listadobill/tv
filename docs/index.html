<!DOCTYPE html>
<html>
<head>
    <title>TV DO BILL</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow-y: auto;
            background-color: black;
        }

        #channel-list {
            display: flex;
            flex-wrap: wrap;
            justify-content: flex-start;
            align-content: flex-start;
            padding: 20px;
        }

        .channel-item {
            width: 150px;
            height: 150px;
            margin: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            text-decoration: none;
            font-size: 14px;
            cursor: pointer;
            border: 2px solid transparent;
        }

        .channel-item.selected {
            border-color: #00ff00;
        }

        .channel-icon {
            width: 80px;
            height: 80px;
            margin-bottom: 10px;
        }
    </style>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        $(document).ready(function() {
            $.get("https://raw.githubusercontent.com/listadobill/tv/main/web.m3u", function(data) {
                var lines = data.split("\n");
                var channelList = $("#channel-list");

                var channels = [];
                for (var i = 0; i < lines.length; i++) {
                    if (lines[i].startsWith("#EXTINF")) {
                        var channelInfo = lines[i].substring(lines[i].indexOf(",") + 1);
                        var channelLink = lines[i + 1];
                        var channelIcon = getTvgLogo(lines[i]);

                        channels.push({ info: channelInfo, link: channelLink, icon: channelIcon });
                    }
                }

                channels.sort(function(a, b) {
                    return a.info.localeCompare(b.info);
                });

                channels.forEach(function(channel, index) {
                    var channelItem = $("<div></div>").addClass("channel-item");
                    var channelIcon = $("<img>").attr("src", channel.icon).addClass("channel-icon");
                    var channelName = $("<span></span>").text(channel.info);

                    channelItem.append(channelIcon);
                    channelItem.append(channelName);
                    channelItem.data("index", index);

                    channelList.append(channelItem);
                });

                $(document).keydown(function(e) {
                    var channelItems = $(".channel-item");
                    var selectedItem = $(".channel-item.selected");
                    var currentIndex = selectedItem.length ? selectedItem.data("index") : -1;
                    var newIndex;

                    switch(e.keyCode) {
                        case 37: // Setinha para a esquerda
                            newIndex = currentIndex - 1;
                            break;
                        case 38: // Setinha para cima
                            window.scrollBy(0, -150); // Rolar para cima
                            break;
                        case 39: // Setinha para a direita
                            newIndex = currentIndex + 1;
                            break;
                        case 40: // Setinha para baixo
                            window.scrollBy(0, 150); // Rolar para baixo
                            break;
                        case 13: // Tecla Enter
                            if (selectedItem.length) {
                                var link = selectedItem.attr("href");
                                window.open(link, "_self");
                            }
                            break;
                    }

                    if (newIndex >= 0 && newIndex < channelItems.length) {
                        selectedItem.removeClass("selected");
                        var newSelectedItem = channelItems.eq(newIndex);
                        newSelectedItem.addClass("selected");

                        var container = $("#channel-list");
                        var containerHeight = container.height();
                        var scrollTop = container.scrollTop();
                        var itemTop = newSelectedItem.position().top;
                        var itemHeight = newSelectedItem.height();

                        if (itemTop < 0) {
                            container.scrollTop(scrollTop + itemTop);
                        } else if (itemTop + itemHeight > containerHeight) {
                            container.scrollTop(scrollTop + itemTop + itemHeight - containerHeight);
                        }
                    }
                });
            });
        });

        function getTvgLogo(line) {
            var regex = /tvg-logo="([^"]+)"/g;
            var matches = regex.exec(line);
            if (matches && matches.length === 2) {
                return matches[1];
            }

            return "placeholder.png"; // Substitua pelo caminho do ícone padrão
        }
    </script>
</head>
<body>
    <div id="channel-list"></div>
</body>
</html>
