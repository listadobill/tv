<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>TV DO BILL</title>
    <style>
        body {
            display: flex;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #000;
            color: #fff;
        }

        #container {
            display: flex;
            flex-direction: row;
            height: 100%;
            overflow: hidden;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
        }

        #channel-list {
            width: 300px;
            background-color: #222;
            overflow-y: auto;
            padding: 20px;
            box-sizing: border-box;
        }

        #channel-list h2 {
            font-size: 20px;
            margin: 0;
            color: #f00;
            text-align: center;
        }

        #channel-list p {
            font-size: 16px;
            margin: 0;
            color: #fff;
            text-align: center;
        }

        #channel-list button {
            display: block;
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            background-color: transparent;
            border: none;
            text-align: left;
            font-size: 16px;
            color: #fff;
            cursor: pointer;
            transition: background-color 0.3s, color 0.3s;
        }

        #channel-list button:hover,
        #channel-list button:focus {
            background-color: #f00;
            color: #000;
        }

        #iptv-player-container {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #111;
            padding: 20px;
            position: relative;
        }

        #iptv-player {
            width: 100%;
            height: 100%;
        }

        #reconnect-overlay {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 30px;
            height: 30px;
            background-color: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #reconnect-overlay::after {
            content: "";
            width: 10px;
            height: 10px;
            border: 2px solid #fff;
            border-right-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        #fullscreen-reminder {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            color: yellow;
            text-align: center;
            z-index: 9999; /* Colocado em um z-index alto para trazer para frente */
        }
    </style>
</head>
<body>
    <div id="fullscreen-reminder">Para abrir em tela cheia, clique no botão do canto inferior direito do reprodutor. O botão se parece com uma janelinha, igual no Youtube.</div>
    <div id="container">
        <div id="channel-list">
            <h2>TV DO BILL</h2>
            <p>A TV de Graça de Verdade!</p>
            <div id="channel-buttons"></div>
        </div>
        <div id="iptv-player-container">
            <div id="reconnect-overlay"></div>
            <video id="iptv-player" controls autoplay></video>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            var playlistUrl = "https://list.iptvcat.com/my_list/92181aeb7c3c2fd05d94974c4e579963.m3u8";
            var channelButtonsContainer = document.getElementById("channel-buttons");
            var videoPlayer = document.getElementById("iptv-player");
            var reconnectOverlay = document.getElementById("reconnect-overlay");

            var currentChannelUrl = ""; // Variável para armazenar a URL do canal atual

            fetch(playlistUrl)
                .then(function(response) {
                    return response.text();
                })
                .then(function(data) {
                    var lines = data.split("\n");
                    var channels = [];

                    for (var i = 0; i < lines.length; i++) {
                        var line = lines[i].trim();

                        if (line.startsWith("#EXTINF:")) {
                            var name = line.split(",")[1];
                            var url = lines[i+1].trim();
                            channels.push({ name: name, url: url });
                        }
                    }

                    channels.sort(function(a, b) {
                        return a.name.localeCompare(b.name);
                    });

                    channels.forEach(function(channel) {
                        var button = document.createElement("button");
                        button.textContent = channel.name.toUpperCase();
                        button.addEventListener("click", function() {
                            playChannel(channel.url);
                        });
                        channelButtonsContainer.appendChild(button);
                    });
                })
                .catch(function(error) {
                    console.error("Erro ao carregar a playlist IPTV:", error);
                });

            function playChannel(url) {
                currentChannelUrl = url;
                videoPlayer.src = url;
                videoPlayer.play();
            }

            videoPlayer.addEventListener("ended", function() {
                reconnectVideo();
            });

            videoPlayer.addEventListener("error", function() {
                reconnectVideo();
            });

            function reconnectVideo() {
                if (currentChannelUrl) {
                    videoPlayer.src = "";
                    videoPlayer.load();
                    videoPlayer.src = currentChannelUrl;
                    videoPlayer.play();
                    showReconnectOverlay();
                }
            }

            function showReconnectOverlay() {
                reconnectOverlay.style.display = "block";
            }

            function hideReconnectOverlay() {
                reconnectOverlay.style.display = "none";
            }

            videoPlayer.addEventListener("canplay", function() {
                hideReconnectOverlay();
            });

            videoPlayer.addEventListener("play", function() {
                if (videoPlayer.requestFullscreen) {
                    videoPlayer.requestFullscreen();
                } else if (videoPlayer.mozRequestFullScreen) {
                    videoPlayer.mozRequestFullScreen();
                } else if (videoPlayer.webkitRequestFullscreen) {
                    videoPlayer.webkitRequestFullscreen();
                } else if (videoPlayer.msRequestFullscreen) {
                    videoPlayer.msRequestFullscreen();
                }
            });
        });
    </script>
</body>
</html>
